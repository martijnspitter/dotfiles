session_name: ${SESSION_NAME}
start_directory: "${QUERY}"
windows:
  - window_name: Editor
    focus: true
    panes:
      - shell_command:
          - cd ~/klar/klar-fe/master
          - nerdfetch
  - window_name: Git
    layout: main-vertical
    panes:
      - shell_command:
          - cd ~/klar/klar-fe/master
          - lazygit
      - shell_command:
          - cd ~/klar/klar-fe/kvl-app
          - lazygit
  - window_name: Claude
    layout: main-vertical
    panes:
      - shell_command:
          - cd ~/klar/klar-fe/master
          - claude
        focus: true
      - shell_command:
          - cd ~/klar/klar-fe/kvl-app
          - claude
  - window_name: Servers
    layout: main-vertical
    panes:
      - shell_command:
          - cd ~/klar/klar-fe/master/proxy
          - docker compose up klar-proxy-prod
      - shell_command:
          - nerdfetch
          - npm run start
      - shell_command:
          - cd ~/klar/klar-fe/kvl-app
          - pnpm run start-kvl
  - window_name: Todo
    panes:
      - shell_command:
          - todo
