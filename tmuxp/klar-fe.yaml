session_name: ${SESSION_NAME}
start_directory: "${QUERY}"
windows:
  - window_name: Editor
    focus: true
    panes:
      - shell_command:
          - nerdfetch
        focus: true
  - window_name: Git
    panes:
      - shell_command:
          - nerdfetch
          - lazygit
  - window_name: Terminal
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
      - shell_command:
          - nerdfetch
  - window_name: Todo
    panes:
      - shell_command:
          - todo
  - window_name: Server
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
          - cd proxy
          - docker compose ps --status running | grep -q klar-proxy-prod && docker compose attach klar-proxy-prod || docker compose up klar-proxy-prod
      - shell_command:
          - nerdfetch
          - portless run pnpm start
