session_name: ${SESSION_NAME}
start_directory: "${QUERY}"
windows:
  - window_name: Editor
    focus: true
    panes:
      - shell_command:
          - nerdfetch
          - nvim
        focus: true
  - window_name: Git
    panes:
      - shell_command:
          - nerdfetch
          - lazygit
  - window_name: Terminal
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
      - shell_command:
          - nerdfetch
  - window_name: Vault
    panes:
      - shell_command:
          - nerdfetch
          - cd ~/obsidian-vault
          - nvim
  - window_name: Server
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
          - cd proxy
          - docker-compose up
      - shell_command:
          - nerdfetch
          - npm start
