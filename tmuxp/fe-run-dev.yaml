session_name: ${SESSION_NAME}
start_directory: "${QUERY}"
windows:
  - window_name: Editor
    focus: true
    panes:
      - shell_command:
          - nerdfetch
  - window_name: Git
    panes:
      - shell_command:
          - nerdfetch
          - lazygit
        focus: true
  - window_name: Terminal
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
      - shell_command:
          - nerdfetch
  - window_name: Todo
    panes:
      - shell_command:
          - todo
  - window_name: Server
    layout: main-vertical
    panes:
      - shell_command:
          - nerdfetch
          - npm run dev
      - shell_command:
          - nerdfetch
